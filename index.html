<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/air-ticket.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>linkdash</title>
    <script>
      (function () {
        const icons = ["/air-ticket.svg", "/hot-air-balloon.svg"];
        const iconHref = icons[Math.floor(Math.random() * icons.length)];
        const favicon = document.querySelector("link[rel='icon']");
        if (favicon) favicon.setAttribute("href", iconHref);

        const saved = localStorage.getItem("theme-mode") || "system";
        const allowed = new Set([
          "blank",
          "pastel-blue-special",
          "girl-holding-rose",
          "easter",
          "pasteltones",
          "thoughts",
          "lonestar",
          "pastelclass",
          "walkalong",
          "evensadness",
        ]);
        const rawPalette = localStorage.getItem("theme-palette");
        const palette = rawPalette && allowed.has(rawPalette) ? rawPalette : "pastel-blue-special";
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const resolved = saved === "system" ? (prefersDark ? "dark" : "light") : saved;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themeMode = saved;
        document.documentElement.dataset.palette = palette;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

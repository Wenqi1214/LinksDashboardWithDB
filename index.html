<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>linkdash</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function () {
        const saved = localStorage.getItem("theme-mode") || "system";
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const resolved = saved === "system" ? (prefersDark ? "dark" : "light") : saved;
        document.documentElement.dataset.theme = resolved;   // "light" | "dark"
        document.documentElement.dataset.themeMode = saved;  // "light" | "dark" | "system"
      })();
    </script>
  </body>
</html>
